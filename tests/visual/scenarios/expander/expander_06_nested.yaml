id: expander_nested
description: "Expander cards can be nested — an outer expander contains an inner expander"
view_path: expander-nested

card:
  type: custom:expander-card
  title: Outer Expander
  expanded: true
  cards:
    - type: custom:expander-card
      title: Inner Expander
      expanded: true
      cards:
        - type: entities
          entities:
            - light.bed_light

assertions:
  - type: element_present
    root: expander-card
    selector: ".children-container.open"

  - type: snapshot
    name: "expander_06_nested"
    threshold: 0.02
