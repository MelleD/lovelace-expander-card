id: expander_expand_click
description: "Clicking the expander button opens the card and reveals child cards"
view_path: expander-expand-click

card:
  type: custom:expander-card
  title: Lights
  cards:
    - type: entities
      entities:
        - light.bed_light

interactions:
  - type: click
    root: expander-card
    selector: ".header"
    settle_ms: 800

assertions:
  - type: element_present
    root: expander-card
    selector: ".header"

  - type: element_present
    root: expander-card
    selector: ".children-container.open"

  - type: snapshot
    name: "expander_03_expand_click"
    threshold: 0.02
