id: expander_clear_background
description: "Expander card with clear:true removes ha-card background and border"
view_path: expander-clear-background

card:
  type: custom:expander-card
  title: Router
  clear: true
  expanded: true
  cards:
    - type: entities
      entities:
        - light.bed_light

assertions:
  - type: element_present
    root: expander-card
    selector: ".children-container.open"

  - type: snapshot
    name: "expander_04_clear_background"
    threshold: 0.02

doc_image:
  output: docs/source/chapter/assets/expander-clear.png
  root: expander-card
  padding: 8
  threshold: 0.02
