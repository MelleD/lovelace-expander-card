id: expander_expanded
description: "Expander card renders in expanded state showing child cards"
view_path: expander-expanded

card:
  type: custom:expander-card
  title: Lights
  expanded: true
  cards:
    - type: entities
      entities:
        - light.bed_light

assertions:
  - type: element_present
    root: expander-card
    selector: ".header"

  - type: element_present
    root: expander-card
    selector: ".children-container.open"

  - type: snapshot
    name: "expander_02_expanded"
    threshold: 0.02
