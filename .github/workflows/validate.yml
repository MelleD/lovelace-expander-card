name: Validate

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-hacs:
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #7.0.0
      - name: HACS validation
        uses: hacs/action@d556e736723344f83838d08488c983a15381059a
        with:
          category: "plugin"
