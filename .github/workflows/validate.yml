name: Validate

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-hacs:
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 #7.0.1
      - name: HACS validation
        uses: hacs/action@d556e736723344f83838d08488c983a15381059a
        with:
          category: "plugin"
